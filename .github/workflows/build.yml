name: Build Windows Installer

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install PyQt6 PyQt6-Qt6 pyinstaller Pillow

      - name: Build with PyInstaller
        run: |
          python -m PyInstaller chess_diagram_creator.spec --noconfirm

      - name: Build Installer with Inno Setup
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.4
        with:
          path: installer/setup.iss

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          INSTALLER=$(ls dist/ChessDiagramCreator_Setup_*.exe | head -1)
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" "$INSTALLER" --title "$TAG" --notes "Automated build for $TAG" || \
          gh release upload "$TAG" "$INSTALLER" --clobber
